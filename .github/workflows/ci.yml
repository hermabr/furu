name: CI

on:
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.label }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "3.12"
            python-version: "3.12"
          - label: "3.x"
            python-version: "3.x"
            check-latest: true
          - label: "3.x free-threaded"
            python-version: "3.x"
            freethreaded: true
            check-latest: true
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          freethreaded: ${{ matrix.freethreaded || false }}
          check-latest: ${{ matrix.check-latest || false }}

      - name: Configure uv Python
        run: echo "UV_PYTHON=${{ steps.setup-python.outputs.python-version }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run tests
        run: |
          uv run ruff check
          uv run ty check
          uv run pytest
